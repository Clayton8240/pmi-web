version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mentor
      POSTGRES_PASSWORD: MM&Br4zil
      POSTGRES_DB: pmi_etiquetas
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mentor -d pmi_etiquetas"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://mentor:MM%26Br4zil@db/pmi_etiquetas
      OUTPUT_FOLDER: /app/etiquetas_geradas
    ports:
      - "8000:8000"
    volumes:
      - ./etiquetas_geradas:/app/etiquetas_geradas
      - ./assets:/app/assets

volumes:
  pgdata:
